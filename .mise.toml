[tasks._beans-serve]
run = 'beans-serve --cors-origin "*"'
description = "Start beans dev server"

[tasks.dev]
run = "cd crates/litmus-web && dx serve --port 8883 --addr 0.0.0.0"
description = "Run Dioxus dev server"

[tasks.build-web]
run = "cd crates/litmus-web && dx build --release"
description = "Build web frontend (release)"

[tasks.build-cli]
run = "cargo build --release --package litmus-cli"
description = "Build CLI binary (release)"

[tasks._cli]
run = "cargo run --package litmus-cli"
description = "Run the litmus TUI"

[tasks.capture]
run = "cargo run --package litmus-capture -- capture-all --provider foot --keep-going"
description = "Capture all screenshots with foot (staging/), skips existing files"

[tasks.capture-manifest]
run = "cargo run --package litmus-capture -- manifest build --base-url http://localhost:8884 --url-prefix ''"
description = "Build manifest.json for local dev (pointing at localhost:8884)"

[tasks.clean-web]
run = "rm -rf target/dx/litmus-web"
description = "Clean Dioxus build cache (needed when changing compile-time env vars)"

[tasks.dev-screenshots]
run = """
echo "Starting local screenshot server on :8884 (CORS enabled)..."
python3 -c "
import http.server
class H(http.server.SimpleHTTPRequestHandler):
    def __init__(self, *a, **kw):
        super().__init__(*a, directory='staging', **kw)
    def end_headers(self):
        self.send_header('Access-Control-Allow-Origin', '*')
        super().end_headers()
http.server.HTTPServer(('0.0.0.0', 8884), H).serve_forever()
" &
SPID=$!
trap "kill $SPID 2>/dev/null" EXIT
echo "Starting Dioxus dev server on :8883 with local manifest..."
cd crates/litmus-web && LITMUS_MANIFEST_URL=http://localhost:8884/manifest.json dx serve --port 8883 --addr 0.0.0.0
"""
description = "Run web app with local screenshots (staging/ on :8884, webapp on :8883)"

[tasks.check]
run = "cargo check --workspace"
description = "Type-check workspace"

[tasks.fmt]
run = "cargo fmt --all"
description = "Format all Rust code"

[tasks._docs-serve]
run = "cd docs && mdbook serve --port 8882 --hostname 0.0.0.0"
description = "Start mdbook live-reload dev server"

[tasks.docs-build]
run = "cd docs && mdbook build"
description = "Build mdbook static site"

[tasks.bacon-claude-diagnostics]
run = "bacon claude-diagnostics"
description = "Run bacon background checker (exports diagnostics to .bacon-claude-diagnostics)"
