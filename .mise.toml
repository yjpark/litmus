[tasks._beans-serve]
run = 'beans-serve --cors-origin "*"'
description = "⭐ Start beans dev server"

[tasks.dev]
run = "cd crates/litmus-web && dx serve --port 8883 --addr 0.0.0.0"
description = "Run Dioxus dev server"

[tasks.build-web]
run = "cd crates/litmus-web && dx build --release"
description = "Build web frontend (release)"

[tasks.build-cli]
run = "cargo build --release --package litmus-cli"
description = "Build CLI binary (release)"

[tasks._cli]
run = "cargo run --package litmus-cli"
description = "Run the litmus TUI"

[tasks.capture-kitty]
run = "cargo run --package litmus-capture -- capture-all --provider kitty --keep-going -j $(( $(nproc) / 2 ))"
description = "Capture screenshots with kitty at half CPU cores (requires Wayland + GPU)"

[tasks.capture-wezterm]
run = "cargo run --package litmus-capture -- capture-all --provider wezterm --keep-going -j $(( $(nproc) / 2 ))"
description = "Capture screenshots with wezterm at half CPU cores (requires Wayland + GPU)"

[tasks.capture-manifest]
run = "cargo run --package litmus-capture -- manifest build --base-url http://localhost:8884 --url-prefix ''"
description = "Build manifest.json for local dev (pointing at localhost:8884)"

[tasks.clean-web]
run = "rm -rf target/dx/litmus-web"
description = "Clean Dioxus build cache (needed when changing compile-time env vars)"

[tasks.dev-screenshots]
run = """
echo "Starting local screenshot server on :8884 (CORS enabled)..."
python3 -c "
import http.server
class H(http.server.SimpleHTTPRequestHandler):
    def __init__(self, *a, **kw):
        super().__init__(*a, directory='staging', **kw)
    def end_headers(self):
        self.send_header('Access-Control-Allow-Origin', '*')
        super().end_headers()
http.server.HTTPServer(('0.0.0.0', 8884), H).serve_forever()
" &
SPID=$!
trap "kill $SPID 2>/dev/null" EXIT
echo "Starting Dioxus dev server on :8883 with local manifest..."
cd crates/litmus-web && LITMUS_MANIFEST_URL=http://localhost:8884/manifest.json dx serve --port 8883 --addr 0.0.0.0
"""
description = "Run web app with local screenshots (staging/ on :8884, webapp on :8883)"

[tasks.check]
run = "cargo check --workspace"
description = "Type-check workspace"

[tasks.fmt]
run = "cargo fmt --all"
description = "Format all Rust code"

[tasks._docs-serve]
run = "cd docs && mdbook serve --port 8882 --hostname 0.0.0.0"
description = "⭐ Start mdbook live-reload dev server"

[tasks.docs-build]
run = "cd docs && mdbook build"
description = "Build mdbook static site"

# --- Screenshot R2 upload tasks ---
# Required env vars (set via shadowenv in .shadowenv.d/):
#   R2_ACCESS_KEY_ID     — Cloudflare R2 S3-compatible access key ID
#   R2_SECRET_ACCESS_KEY — Cloudflare R2 S3-compatible secret access key
#   R2_ENDPOINTS         — R2 S3 endpoint, e.g. https://<account-id>.r2.cloudflarestorage.com

[tasks.screenshots-sync]
run = """
R2_COMMON="--s3-provider Cloudflare --s3-access-key-id $R2_ACCESS_KEY_ID --s3-secret-access-key $R2_SECRET_ACCESS_KEY --s3-endpoint $R2_ENDPOINTS --s3-no-check-bucket --checksum --progress --verbose"

echo "Syncing images (immutable, 1yr TTL)..."
rclone sync staging/ :s3:litmus-screenshots \
  $R2_COMMON \
  --exclude manifest.json \
  --header-upload "Cache-Control: public, max-age=31536000, immutable"

echo ""
echo "Syncing manifest (short TTL, 1min)..."
rclone copyto staging/manifest.json :s3:litmus-screenshots/manifest.json \
  $R2_COMMON \
  --header-upload "Cache-Control: public, max-age=60"
"""
description = "Sync staging/ screenshots to R2 bucket (with cache headers)"

[tasks."screenshots-sync_ignore-checksum"]
run = """
R2_COMMON="--s3-provider Cloudflare --s3-access-key-id $R2_ACCESS_KEY_ID --s3-secret-access-key $R2_SECRET_ACCESS_KEY --s3-endpoint $R2_ENDPOINTS --s3-no-check-bucket --progress --verbose"

echo "Re-uploading all images (immutable, 1yr TTL)..."
rclone sync staging/ :s3:litmus-screenshots \
  $R2_COMMON \
  --exclude manifest.json \
  --header-upload "Cache-Control: public, max-age=31536000, immutable"

echo ""
echo "Re-uploading manifest (short TTL, 1min)..."
rclone copyto staging/manifest.json :s3:litmus-screenshots/manifest.json \
  $R2_COMMON \
  --header-upload "Cache-Control: public, max-age=60"
"""
description = "Force re-upload all screenshots to R2 (ignores checksum, applies cache headers)"

[tasks.screenshots-deploy]
run = """
echo "Building production manifest..."
cargo run --package litmus-capture -- manifest build \
  --base-url https://screenshots.litmus.edger.dev \
  --url-prefix ''

echo ""
echo "Syncing to R2..."
mise run screenshots-sync
"""
description = "Build production manifest + sync all screenshots to R2"

[tasks.jig-update]
run = "nix flake update jig"
description = "Update jig to latest from github"

[tasks.jig-update-local]
run = "nix flake update --override-input jig path:$HOME/edger/jig"
description = "Override jig with local checkout (for development)"

[tasks._bacon-claude-diagnostics]
run = "bacon claude-diagnostics"
description = "⭐ Run bacon background checker (exports diagnostics to .bacon-claude-diagnostics)"
